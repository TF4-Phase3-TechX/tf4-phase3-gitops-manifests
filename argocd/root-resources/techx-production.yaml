apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: techx-production
  namespace: argocd
spec:
  description: "Production AppProject for TechX Webstore Platform"
  sourceRepos:
    - 'https://github.com/TF4-Phase3-TechX/tf4-phase3-repo.git'
    - 'https://github.com/TF4-Phase3-TechX/tf4-phase3-gitops-manifests.git'
    - 'https://charts.external-secrets.io'
  destinations:
    - namespace: techx-tf4
      server: https://kubernetes.default.svc
    - namespace: techx-observability
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
  orphanedResources:
    warn: true
  clusterResourceWhitelist:
    - group: "external-secrets.io"
      kind: "ClusterSecretStore"
    - group: "argoproj.io"
      kind: "AppProject"
    - group: "apiextensions.k8s.io"
      kind: "CustomResourceDefinition"
    - group: "rbac.authorization.k8s.io"
      kind: "ClusterRole"
    - group: "rbac.authorization.k8s.io"
      kind: "ClusterRoleBinding"
    - group: "admissionregistration.k8s.io"
      kind: "ValidatingWebhookConfiguration"
    - group: "admissionregistration.k8s.io"
      kind: "MutatingWebhookConfiguration"
    - group: "apiregistration.k8s.io"
      kind: "APIService"
  namespaceResourceWhitelist:
    - group: ""
      kind: "ConfigMap"
    - group: ""
      kind: "PersistentVolumeClaim"
    - group: ""
      kind: "Secret"
    - group: ""
      kind: "Service"
    - group: ""
      kind: "ServiceAccount"
    - group: "apps"
      kind: "DaemonSet"
    - group: "apps"
      kind: "Deployment"
    - group: "apps"
      kind: "StatefulSet"
    - group: "autoscaling"
      kind: "HorizontalPodAutoscaler"
    - group: "batch"
      kind: "CronJob"
    - group: "external-secrets.io"
      kind: "ExternalSecret"
    - group: "policy"
      kind: "PodDisruptionBudget"
    - group: "rbac.authorization.k8s.io"
      kind: "Role"
    - group: "rbac.authorization.k8s.io"
      kind: "RoleBinding"
    - group: "networking.k8s.io"
      kind: "Ingress"
    - group: "apiregistration.k8s.io"
      kind: "APIService"
    - group: "argoproj.io"
      kind: "Application"
