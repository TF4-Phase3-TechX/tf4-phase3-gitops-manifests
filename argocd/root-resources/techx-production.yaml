apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: techx-production
  namespace: argocd
spec:
  description: "Production AppProject for TechX Webstore Platform"
  sourceRepos:
    - 'https://github.com/TF4-Phase3-TechX/tf4-phase3-repo.git'
    - 'https://github.com/TF4-Phase3-TechX/tf4-phase3-gitops-manifests.git'
    - 'https://charts.external-secrets.io'
    - 'https://kyverno.github.io/kyverno/'
    - 'https://argoproj.github.io/argo-helm'
    - 'https://strimzi.io/charts/'
  destinations:
    - namespace: techx-tf4
      server: https://kubernetes.default.svc
    - namespace: techx-observability
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: kyverno
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: argo-rollouts
      server: https://kubernetes.default.svc
    - namespace: kafka-operator
      server: https://kubernetes.default.svc
    - namespace: cloudflare-access
      server: https://kubernetes.default.svc
  orphanedResources:
    warn: true
    ignore:
      - kind: Secret
        name: sh.helm.release.v1.techx-corp.v*
      - kind: Secret
        name: sh.helm.release.v1.techx-observability.v*
  clusterResourceWhitelist:
    - group: "external-secrets.io"
      kind: "ClusterSecretStore"
    - group: "policies.kyverno.io"
      kind: "ImageValidatingPolicy"
    - group: "kyverno.io"
      kind: "PolicyException"
    - group: "argoproj.io"
      kind: "AppProject"
    - group: "apiextensions.k8s.io"
      kind: "CustomResourceDefinition"
    - group: "rbac.authorization.k8s.io"
      kind: "ClusterRole"
    - group: "rbac.authorization.k8s.io"
      kind: "ClusterRoleBinding"
    - group: "admissionregistration.k8s.io"
      kind: "ValidatingWebhookConfiguration"
    - group: "admissionregistration.k8s.io"
      kind: "MutatingWebhookConfiguration"
    - group: "admissionregistration.k8s.io"
      kind: "ValidatingAdmissionPolicy"
    - group: "admissionregistration.k8s.io"
      kind: "ValidatingAdmissionPolicyBinding"
    - group: ""
      kind: "Namespace"
    - group: "storage.k8s.io"
      kind: "StorageClass"
    - group: "apiregistration.k8s.io"
      kind: "APIService"
  namespaceResourceWhitelist:
    - group: ""
      kind: "ConfigMap"
    - group: ""
      kind: "PersistentVolumeClaim"
    - group: ""
      kind: "ResourceQuota"
    - group: ""
      kind: "Secret"
    - group: ""
      kind: "Service"
    - group: ""
      kind: "ServiceAccount"
    - group: "apps"
      kind: "DaemonSet"
    - group: "apps"
      kind: "Deployment"
    - group: "apps"
      kind: "StatefulSet"
    - group: "autoscaling"
      kind: "HorizontalPodAutoscaler"
    - group: "batch"
      kind: "CronJob"
    - group: "batch"
      kind: "Job"
    - group: "external-secrets.io"
      kind: "ExternalSecret"
    - group: "policy"
      kind: "PodDisruptionBudget"
    - group: "rbac.authorization.k8s.io"
      kind: "Role"
    - group: "rbac.authorization.k8s.io"
      kind: "RoleBinding"
    - group: "networking.k8s.io"
      kind: "Ingress"
    - group: "apiregistration.k8s.io"
      kind: "APIService"
    - group: "argoproj.io"
      kind: "Application"
    - group: "argoproj.io"
      kind: "Rollout"
    - group: "kafka.strimzi.io"
      kind: "KafkaMirrorMaker2"
