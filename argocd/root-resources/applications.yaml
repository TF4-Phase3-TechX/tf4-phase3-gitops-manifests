---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techx-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: techx-production
  sources:
    - repoURL: 'https://github.com/TF4-Phase3-TechX/tf4-phase3-repo.git'
      targetRevision: 61e0b6ea1c37803200829bf1d91c713c4f0cde1c
      path: techx-corp-chart
      ref: chart-source
      helm:
        releaseName: techx-observability
        valueFiles:
          - '$values-source/environments/production/observability-values.yaml'
          - '$values-source/environments/production/alertmanager-routing-values.yaml'
    - repoURL: 'https://github.com/TF4-Phase3-TechX/tf4-phase3-gitops-manifests.git'
      targetRevision: main
      ref: values-source
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: techx-observability
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - FailOnSharedResource=true
      - ApplyOutOfSyncOnly=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techx-corp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: techx-production
  sources:
    - repoURL: 'https://github.com/TF4-Phase3-TechX/tf4-phase3-repo.git'
      targetRevision: 61e0b6ea1c37803200829bf1d91c713c4f0cde1c
      path: techx-corp-chart
      ref: chart-source
      helm:
        releaseName: techx-corp
        valueFiles:
          - '$values-source/environments/production/app-values.yaml'
          - '$values-source/environments/production/flagd-values.yaml'
          - '$values-source/environments/production/image-revisions.yaml'
    - repoURL: 'https://github.com/TF4-Phase3-TechX/tf4-phase3-gitops-manifests.git'
      targetRevision: main
      ref: values-source
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: techx-tf4
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - FailOnSharedResource=true
      - ApplyOutOfSyncOnly=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
