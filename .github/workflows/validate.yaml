name: GitOps Manifest Validation
on:
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Config Repo
        uses: actions/checkout@v4
      - name: Checkout pinned source chart
        uses: actions/checkout@v4
        with:
          repository: TF4-Phase3-TechX/tf4-phase3-repo
          ref: 1b03bfe0b6316ffa15dd58486752920f4b295db1
          path: source-repo
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Dry-run and Template rendering validation
        run: |
          helm template techx-corp ./source-repo/techx-corp-chart \
            -f environments/production/app-values.yaml \
            -f environments/production/flagd-values.yaml \
            -f environments/production/image-revisions.yaml > /dev/null
          
          helm template techx-observability ./source-repo/techx-corp-chart \
            -f environments/production/observability-values.yaml \
            -f environments/production/alertmanager-routing-values.yaml \
            -f environments/production/flagd-values.yaml > /dev/null
          echo "Validation completed successfully!"
