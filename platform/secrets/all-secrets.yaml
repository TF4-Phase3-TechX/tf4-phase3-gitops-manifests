---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: msk-kafka-secret
  namespace: techx-tf4
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: msk-kafka-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: kafka-address
      remoteRef:
        key: techx/tf4/msk-kafka
        property: bootstrap_servers
    - secretKey: security-protocol
      remoteRef:
        key: techx/tf4/msk-kafka
        property: security_protocol
    - secretKey: sasl-mechanism
      remoteRef:
        key: techx/tf4/msk-kafka
        property: sasl_mechanism
    - secretKey: username
      remoteRef:
        key: techx/tf4/msk-kafka
        property: username
    - secretKey: password
      remoteRef:
        key: techx/tf4/msk-kafka
        property: password
