apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-db-secret
  namespace: techx-tf4
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: postgres-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: techx/tf4/postgres
        property: password
    - secretKey: username
      remoteRef:
        key: techx/tf4/postgres
        property: username

