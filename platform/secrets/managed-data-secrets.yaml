# CDO08-SEC-13C: ExternalSecret manifests for managed data services
# Task: [SEC-13C][ESO] Configure SecretStore/ExternalSecret/IRSA access
#
# Ownership: GitOps repo manages these ExternalSecrets under platform/secrets/.
# App repo (techx-corp-chart) does NOT render these — only references the resulting
# Kubernetes Secrets via secretKeyRef.
#
# Pre-requisites before this file is effective:
#   1. ClusterSecretStore/aws-secretsmanager must be Ready (cluster-secret-store.yaml)
#   2. ESO IRSA role must allow GetSecretValue on arn:...:secret:techx/tf4/*
#   3. AWS Secrets Manager secrets must exist under techx/tf4/ prefix
#
# DO NOT add plaintext secret values here. Only secret names, key references.
# Secret schema defined in: tf4-phase3-repo/docs/cdo08/sec-13-managed-data-secret-contract.md

---
# RDS PostgreSQL — syncs connection strings for accounting (.NET), product-catalog (Go), product-reviews (Python)
# Source: techx/tf4/rds-postgres
# Target Kubernetes Secret: rds-postgres-secret in techx-tf4
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-postgres-secret
  namespace: techx-tf4
  labels:
    app.kubernetes.io/part-of: techx-corp
    app.kubernetes.io/managed-by: eso
    cdo08-task: sec-13c
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rds-postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: dotnet-conn-string
      remoteRef:
        key: techx/tf4/rds-postgres
        property: connection_string_dotnet
    - secretKey: go-conn-string
      remoteRef:
        key: techx/tf4/rds-postgres
        property: connection_string_go
    - secretKey: python-conn-string
      remoteRef:
        key: techx/tf4/rds-postgres
        property: connection_string_python

---
# ElastiCache Valkey — syncs address for cart service
# Source: techx/tf4/elasticache-valkey
# Target Kubernetes Secret: elasticache-valkey-secret in techx-tf4
# Note: add password/tls_enabled keys here only after cart AUTH/TLS support is confirmed
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: elasticache-valkey-secret
  namespace: techx-tf4
  labels:
    app.kubernetes.io/part-of: techx-corp
    app.kubernetes.io/managed-by: eso
    cdo08-task: sec-13c
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: elasticache-valkey-secret
    creationPolicy: Owner
  data:
    - secretKey: valkey-address
      remoteRef:
        key: techx/tf4/elasticache-valkey
        property: address

---
# MSK Kafka — syncs bootstrap servers for accounting, checkout, fraud-detection
# Source: techx/tf4/msk-kafka
# Target Kubernetes Secret: msk-kafka-secret in techx-tf4
# Note: if MSK uses SCRAM auth, add username/password/security-protocol keys after auth mode is confirmed
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: msk-kafka-secret
  namespace: techx-tf4
  labels:
    app.kubernetes.io/part-of: techx-corp
    app.kubernetes.io/managed-by: eso
    cdo08-task: sec-13c
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: msk-kafka-secret
    creationPolicy: Owner
  data:
    - secretKey: kafka-address
      remoteRef:
        key: techx/tf4/msk-kafka
        property: bootstrap_servers
