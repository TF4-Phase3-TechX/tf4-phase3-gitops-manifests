# CDO08-SEC-13C: ExternalSecret manifests for managed data services
# Task: [SEC-13C][ESO] Configure SecretStore/ExternalSecret/IRSA access
# Mục tiêu: ESO sync được secret vào techx-tf4
#
# ClusterSecretStore: aws-secretsmanager (platform/secrets/cluster-secret-store.yaml) — không sửa.
# IRSA pre-flight: ESO service account phải có annotation eks.amazonaws.com/role-arn trỏ đến
#   role external-secrets-<cluster_name> với policy GetSecretValue trên arn:...:secret:techx/tf4/*
#   Xác nhận: kubectl -n external-secrets get serviceaccount external-secrets -o yaml
#
# Không đặt plaintext secret value ở đây. Chỉ chứa secret name và key reference.

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-postgres-secret
  namespace: techx-tf4
  labels:
    app.kubernetes.io/part-of: techx-corp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rds-postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: dotnet-conn-string
      remoteRef:
        key: techx/tf4/rds-postgres
        property: connection_string_dotnet
    - secretKey: go-conn-string
      remoteRef:
        key: techx/tf4/rds-postgres
        property: connection_string_go
    - secretKey: python-conn-string
      remoteRef:
        key: techx/tf4/rds-postgres
        property: connection_string_python

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: elasticache-valkey-secret
  namespace: techx-tf4
  labels:
    app.kubernetes.io/part-of: techx-corp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: elasticache-valkey-secret
    creationPolicy: Owner
  data:
    - secretKey: valkey-address
      remoteRef:
        key: techx/tf4/elasticache-valkey
        property: address

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: msk-kafka-secret
  namespace: techx-tf4
  labels:
    app.kubernetes.io/part-of: techx-corp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: msk-kafka-secret
    creationPolicy: Owner
  data:
    - secretKey: kafka-address
      remoteRef:
        key: techx/tf4/msk-kafka
        property: bootstrap_servers
