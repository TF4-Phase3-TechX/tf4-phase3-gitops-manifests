# CDO08-SEC-05: Cloudflare Access tunnel token sync.
# Terraform owns the AWS Secrets Manager secret metadata:
#   techx/tf4/cloudflare/tunnel-token
# The real token value is inserted out-of-band and is never committed to Git.
---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare-access
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: private-access
    app.kubernetes.io/part-of: techx-corp
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel-token
  namespace: cloudflare-access
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: private-access
    app.kubernetes.io/part-of: techx-corp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: cloudflare-tunnel-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: techx/tf4/cloudflare/tunnel-token
        property: token
