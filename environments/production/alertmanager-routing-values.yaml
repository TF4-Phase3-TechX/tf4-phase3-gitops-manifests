prometheus:
  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
        smtp_smarthost: 'smtp.gmail.com:587'
        smtp_from: 'tf4.audit.alerts@gmail.com'
        smtp_auth_username: 'tf4.audit.alerts@gmail.com'
        smtp_auth_password_file: '/etc/alertmanager/secrets/smtp-password'
        smtp_require_tls: true
      route:
        group_by: ['alertname']
        group_wait: 10s
        group_interval: 10s
        repeat_interval: 1h
        receiver: 'email-notifications'
      receivers:
      - name: 'email-notifications'
        # Temporarily pause Gmail SMTP notifications while the account cools down
        # from repeated auth throttling. Keep this block for quick rollback.
        # email_configs:
        # - to: 'tf4-audit-oncall@googlegroups.com'
        #   from: 'tf4.audit.alerts@gmail.com'
        #   smarthost: 'smtp.gmail.com:587'
        #   auth_username: 'tf4.audit.alerts@gmail.com'
        #   auth_password_file: '/etc/alertmanager/secrets/smtp-password'
        #   require_tls: true
        #   send_resolved: true
        slack_configs:
        - api_url_file: /etc/alertmanager/slack/webhook-url
          send_resolved: true
          color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
          title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}{{ if .CommonLabels.severity }} | {{ .CommonLabels.severity }}{{ end }}'
          text: |-
            {{ range .Alerts }}
            *Alert:* {{ .Labels.alertname }}
            {{- if .Labels.severity }}
            *Severity:* `{{ .Labels.severity }}`
            {{- end }}
            {{- if .Labels.namespace }}
            *Namespace:* `{{ .Labels.namespace }}`
            {{- end }}
            {{- if .Labels.service }}
            *Service:* `{{ .Labels.service }}`
            {{- end }}
            {{- if .Labels.pod }}
            *Pod:* `{{ .Labels.pod }}`
            {{- end }}
            {{- if .Annotations.summary }}
            *Summary:* {{ .Annotations.summary }}
            {{- end }}
            {{- if .Annotations.description }}
            *Description:* {{ .Annotations.description }}
            {{- end }}
            {{ end }}
