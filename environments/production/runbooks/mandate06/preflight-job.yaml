apiVersion: batch/v1
kind: Job
metadata:
  name: product-reviews-bedrock-cross-account-preflight
  namespace: techx-tf4
  labels:
    app.kubernetes.io/name: product-reviews-bedrock-preflight
    app.kubernetes.io/part-of: mandate-06
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: product-reviews-bedrock-preflight
        app.kubernetes.io/part-of: mandate-06
    spec:
      serviceAccountName: product-reviews-bedrock
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: preflight
          image: 511825856493.dkr.ecr.us-east-1.amazonaws.com/techx-corp@sha256:b2cd465b868072370a720d56fc29695eef4d3e35e705e454142f6a018cb4bfde
          imagePullPolicy: IfNotPresent
          command: ["python", "-c"]
          args:
            - |
              import json
              import time
              import boto3

              region = "us-east-1"
              identity = boto3.client("sts", region_name=region).get_caller_identity()
              if identity["Account"] != "589077667575":
                  raise RuntimeError("unexpected_target_account")
              if "tf4-product-reviews-bedrock-emergency-target" not in identity["Arn"]:
                  raise RuntimeError("unexpected_target_role")

              runtime = boto3.client("bedrock-runtime", region_name=region)
              started = time.monotonic()
              response = runtime.converse(
                  modelId="us.amazon.nova-2-lite-v1:0",
                  messages=[
                      {
                          "role": "user",
                          "content": [{"text": "Reply with exactly OK."}],
                      }
                  ],
                  guardrailConfig={
                      "guardrailIdentifier": "e2svpiawj1v5",
                      "guardrailVersion": "3",
                      "trace": "disabled",
                  },
                  inferenceConfig={"maxTokens": 10, "temperature": 0},
              )
              elapsed_ms = round((time.monotonic() - started) * 1000, 1)
              usage = response.get("usage", {})
              print(
                  json.dumps(
                      {
                          "result": "PASS",
                          "account": identity["Account"],
                          "role": "tf4-product-reviews-bedrock-emergency-target",
                          "model_id": "us.amazon.nova-2-lite-v1:0",
                          "guardrail_id": "e2svpiawj1v5",
                          "guardrail_version": "3",
                          "latency_ms": elapsed_ms,
                          "input_tokens": int(usage.get("inputTokens", 0)),
                          "output_tokens": int(usage.get("outputTokens", 0)),
                      }
                  )
              )
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
