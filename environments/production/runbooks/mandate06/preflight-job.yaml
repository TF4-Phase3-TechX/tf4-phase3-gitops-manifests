apiVersion: batch/v1
kind: Job
metadata:
  name: product-reviews-bedrock-cross-account-preflight
  namespace: techx-tf4
  labels:
    app.kubernetes.io/name: product-reviews-bedrock-preflight
    app.kubernetes.io/part-of: mandate-06
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: product-reviews-bedrock-preflight
        app.kubernetes.io/part-of: mandate-06
    spec:
      serviceAccountName: product-reviews-bedrock
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: preflight
          image: 511825856493.dkr.ecr.us-east-1.amazonaws.com/techx-corp@sha256:f8a938d6822a1e689dde1f8df01123635dcbd68bea32fa681ff8e439061aaa92
          imagePullPolicy: IfNotPresent
          command: ["/venv/bin/python", "-c"]
          args:
            - |
              import json
              import os
              import boto3
              from bedrock_adapter import BedrockAdapter
              from safety import validate_grounded_output

              region = "us-east-1"
              model_id = "us.amazon.nova-2-lite-v1:0"
              guardrail_id = "e2svpiawj1v5"
              guardrail_version = "3"
              image_digest = "sha256:f8a938d6822a1e689dde1f8df01123635dcbd68bea32fa681ff8e439061aaa92"
              system_canary = os.environ.get("BEDROCK_SYSTEM_CANARY", "")
              if not system_canary:
                  raise RuntimeError("missing_system_canary")
              question = "What do the reviews say about durability and comfort?"
              product = {
                  "id": "audit-synthetic-product",
                  "name": "Synthetic Travel Backpack",
                  "description": "Synthetic metadata-only contract preflight.",
                  "categories": ["travel", "backpacks"],
              }
              reviews = [
                  {"review_id": 91001, "description": "The zipper remained smooth after six months of daily use.", "score": "5"},
                  {"review_id": 91002, "description": "The shoulder straps stayed comfortable during a three-hour walk.", "score": "5"},
                  {"review_id": 91003, "description": "The fabric resisted light rain and showed no visible wear.", "score": "4"},
              ]

              identity = boto3.client("sts", region_name=region).get_caller_identity()
              if identity["Account"] != "589077667575":
                  raise RuntimeError("unexpected_target_account")
              expected_role_prefix = (
                  "arn:aws:sts::589077667575:assumed-role/"
                  "tf4-product-reviews-bedrock-emergency-target/"
              )
              if not identity["Arn"].startswith(expected_role_prefix):
                  raise RuntimeError("unexpected_target_role")

              adapter = BedrockAdapter(
                  model_id=model_id,
                  guardrail_id=guardrail_id,
                  guardrail_version=guardrail_version,
                  region=region,
                  output_mode="tool",
                  deadline_seconds=4.5,
                  system_canary=system_canary,
              )
              result = adapter.converse(question, product, reviews)
              if result.latency_ms > 4500:
                  raise RuntimeError("deadline_exceeded")
              if result.stop_reason != "tool_use":
                  raise RuntimeError("unexpected_stop_reason")
              if result.contract_stage != "tool_input_dict":
                  raise RuntimeError("unexpected_contract_stage")

              validated = validate_grounded_output(result.payload, reviews, system_canary)
              if validated["decision"] != "answered":
                  raise RuntimeError("supported_question_not_answered")
              citation_ids = {citation["review_id"] for citation in validated["citations"]}
              if 91002 not in citation_ids or not citation_ids.intersection({91001, 91003}):
                  raise RuntimeError("missing_supported_topic_citation")
              if result.input_tokens <= 0 or result.output_tokens <= 0:
                  raise RuntimeError("missing_token_usage")
              print(
                  json.dumps(
                      {
                          "result": "PASS",
                          "account": identity["Account"],
                          "role": "tf4-product-reviews-bedrock-emergency-target",
                          "image_digest": image_digest,
                          "model_id": model_id,
                          "guardrail_id": guardrail_id,
                          "guardrail_version": guardrail_version,
                          "stop_reason": result.stop_reason,
                          "contract_stage": result.contract_stage,
                          "decision": validated["decision"],
                          "citation_count": len(validated["citations"]),
                          "latency_ms": round(result.latency_ms, 1),
                          "input_tokens": result.input_tokens,
                          "output_tokens": result.output_tokens,
                          "content_retained": False,
                      }
                  )
              )
          env:
            - name: BEDROCK_SYSTEM_CANARY
              valueFrom:
                secretKeyRef:
                  name: product-reviews-bedrock-canary
                  key: marker
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
