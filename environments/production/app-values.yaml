# Team tách nhau trong Grafana theo k8s.namespace.name (collector chung tự gắn).
# TUNE khi deploy lần đầu: xác nhận OTEL_COLLECTOR_NAME override ăn.

# Disable dependency sub-charts (root-level per chart schema)
opentelemetry-collector: { enabled: false }
jaeger: { enabled: false }
prometheus: { enabled: false }
grafana: { enabled: false }
opensearch: { enabled: false }
metrics-server: { enabled: false }

default:
  envOverrides:
    - name: OTEL_COLLECTOR_NAME
      value: otel-collector.techx-observability.svc.cluster.local

components:
  # CDO08-REL-17: enable Argo Rollouts Blue-Green for checkout only — the only
  # Kafka cutover service with a real inbound Service. accounting/fraud-detection
  # are pure Kafka consumers (no Service) and use strategy: Recreate instead
  # (set in the chart directly, no GitOps flag needed) — see
  # KAFKA-CUTOVER-RETRY-RUNBOOK.md Mục B.
  checkout:
    useRollout: true

  cart:
    # CDO08-REL-16 BƯỚC 3.1: cutover to ElastiCache via Blue-Green Rollout (paused
    # until 06-promote-rollout.sh). Requires top-level rollouts.enabled: true below.
    # rolloutStrategy set explicitly (not just relying on the chart default) since
    # the ArgoCD-pinned chart revision predates that default existing for cart.
    useRollout: true
    rolloutStrategy:
      blueGreen:
        autoPromotionEnabled: false
    envOverrides:
      # NOTE: "master.<rg-id>...cache.amazonaws.com" only exists while the
      # replication group is mid Online Migration ("migrating" status). Once
      # 05-complete-migration.sh finishes, that hostname stops resolving —
      # this must be the standalone node-group primary endpoint instead.
      - name: VALKEY_ADDR
        value: "techx-tf4-valkey-cart.pyo0mq.ng.0001.use1.cache.amazonaws.com:6379"

  load-generator:
    envOverrides:
      - name: LOCUST_AUTOSTART
        value: "true"

  frontend-proxy:
    envOverrides:
      - name: GRAFANA_HOST
        value: grafana.techx-observability.svc.cluster.local
      - name: JAEGER_HOST
        value: jaeger.techx-observability.svc.cluster.local

  postgresql:
    command:
      - docker-entrypoint.sh
      - postgres
      - -c
      - wal_level=logical

  product-reviews:
    serviceAccountName: product-reviews-bedrock
    readinessProbe:
      grpc:
        port: 3551
      initialDelaySeconds: 2
      periodSeconds: 2
      timeoutSeconds: 1
      failureThreshold: 30
      successThreshold: 1
    envOverrides:
      - name: AWS_REGION
        value: us-east-1
      - name: BEDROCK_MODEL_ID
        value: us.amazon.nova-2-lite-v1:0
      - name: BEDROCK_GUARDRAIL_ID
        value: e2svpiawj1v5
      - name: BEDROCK_GUARDRAIL_VERSION
        value: "3"
      - name: BEDROCK_OUTPUT_MODE
        value: tool
      - name: BEDROCK_DEADLINE_SECONDS
        value: "4.5"
      - name: BEDROCK_INPUT_USD_PER_MILLION
        value: "0.30"
      - name: BEDROCK_OUTPUT_USD_PER_MILLION
        value: "2.50"
      - name: BEDROCK_SYSTEM_CANARY
        valueFrom:
          secretKeyRef:
            name: product-reviews-bedrock-canary
            key: marker
      - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
        value: "false"
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 10001
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

rollouts:
  enabled: true

bastionPortalAccess: { enabled: true }

postgresqlMigrationBridge:
  enabled: true

managedData:
  enabled: true
  postgresql:
    enabled: true
    secretName: rds-postgres-secret
  kafka:
    enabled: false
    secretName: msk-kafka-secret

# CDO08-REL-17: start Kafka self-hosted -> MSK live replication with Strimzi MirrorMaker2.
# This does not cut over checkout/accounting/fraud-detection traffic.
mirrormaker2:
  enabled: true
  version: 4.2.1
  targetCluster:
    bootstrapServers: "b-2.techxtf4orders.5n1354.c2.kafka.us-east-1.amazonaws.com:9096,b-1.techxtf4orders.5n1354.c2.kafka.us-east-1.amazonaws.com:9096"

valkeyMigrationBridge:
  # CDO08-REL-16 BƯỚC 1.2: temporary internal NLB bridge so AWS ElastiCache Online
  # Migration can reach the self-hosted valkey-cart source. Disable + cleanup after
  # cutover is stable (BƯỚC 3.8 / 08-cleanup.sh) - do not leave enabled long-term.
  enabled: true
