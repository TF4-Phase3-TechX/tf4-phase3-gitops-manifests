# Team tách nhau trong Grafana theo k8s.namespace.name (collector chung tự gắn).
# TUNE khi deploy lần đầu: xác nhận OTEL_COLLECTOR_NAME override ăn.

# Disable dependency sub-charts (root-level per chart schema)
opentelemetry-collector: { enabled: false }
jaeger: { enabled: false }
prometheus: { enabled: false }
grafana: { enabled: false }
opensearch: { enabled: false }
metrics-server: { enabled: false }

# Run the detector continuously while every production mutation path remains
# disabled until ADR-022 has named CDO/on-call approval and a live-drill window.
aiopsRemediation:
  liveEnabled: false

default:
  envOverrides:
    - name: OTEL_COLLECTOR_NAME
      value: otel-collector.techx-observability.svc.cluster.local

components:
  aiops:
    enabled: true
    envOverrides:
      - name: REMEDIATION_MODE
        value: dry-run
      - name: AIOPS_AUTONOMOUS_REMEDIATION_ENABLED
        value: "false"
      - name: OPENSEARCH_URL
        value: http://opensearch.techx-observability.svc.cluster.local:9200

  # CDO08-REL-17: enable Argo Rollouts Blue-Green for checkout only — the only
  # Kafka cutover service with a real inbound Service. accounting/fraud-detection
  # are pure Kafka consumers (no Service) and use strategy: Recreate instead
  # (set in the chart directly, no GitOps flag needed) — see
  # KAFKA-CUTOVER-RETRY-RUNBOOK.md Mục B.
  checkout:
    useRollout: true

  cart:
    # CDO08-REL-16 BƯỚC 3.1: cutover to ElastiCache via Blue-Green Rollout (paused
    # until 06-promote-rollout.sh). Requires top-level rollouts.enabled: true below.
    # rolloutStrategy set explicitly (not just relying on the chart default) since
    # the ArgoCD-pinned chart revision predates that default existing for cart.
    # CDO08-SEC-13/REL-16: endpoint/TLS/password now come from
    # elasticache-valkey-secret through managedData.valkey below, not plaintext
    # envOverrides.
    useRollout: true
    rolloutStrategy:
      blueGreen:
        autoPromotionEnabled: false

  load-generator:
    envOverrides:
      - name: LOCUST_AUTOSTART
        value: "true"

  frontend-proxy:
    envOverrides:
      - name: GRAFANA_HOST
        value: grafana.techx-observability.svc.cluster.local
      - name: JAEGER_HOST
        value: jaeger.techx-observability.svc.cluster.local

  postgresql:
    enabled: false
    command:
      - docker-entrypoint.sh
      - postgres
      - -c
      - wal_level=logical

  kafka:
    enabled: false

  valkey-cart:
    enabled: false

  product-reviews:
    serviceAccountName: product-reviews-bedrock
    readinessProbe:
      grpc:
        port: 3552
      initialDelaySeconds: 2
      periodSeconds: 2
      timeoutSeconds: 1
      failureThreshold: 30
      successThreshold: 1
    envOverrides:
      - name: AWS_REGION
        value: us-east-1
      - name: BEDROCK_MODEL_ID
        value: us.amazon.nova-2-lite-v1:0
      - name: BEDROCK_GUARDRAIL_ID
        value: e2svpiawj1v5
      - name: BEDROCK_GUARDRAIL_VERSION
        value: "3"
      - name: BEDROCK_OUTPUT_MODE
        value: tool
      - name: BEDROCK_DEADLINE_SECONDS
        value: "4.5"
      - name: BEDROCK_INPUT_USD_PER_MILLION
        value: "0.30"
      - name: BEDROCK_OUTPUT_USD_PER_MILLION
        value: "2.50"
      - name: BEDROCK_SYSTEM_CANARY
        valueFrom:
          secretKeyRef:
            name: product-reviews-bedrock-canary
            key: marker
      - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
        value: "false"
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 10001
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

rollouts:
  enabled: true

bastionPortalAccess: { enabled: true }

postgresqlMigrationBridge:
  enabled: false

managedData:
  enabled: true
  postgresql:
    enabled: true
    secretName: rds-postgres-secret
  valkey:
    enabled: true
    secretName: elasticache-valkey-secret
  kafka:
    enabled: true
    secretName: msk-kafka-secret
    # CDO08-REL-17: complete Kafka/MSK app cutover. checkout is the producer;
    # accounting and fraud-detection are consumers that must read from MSK before
    # the self-hosted kafka pod can be decommissioned.
    services: [checkout, accounting, fraud-detection]

# CDO08-REL-17: start Kafka self-hosted -> MSK live replication with Strimzi MirrorMaker2.
# This does not cut over checkout/accounting/fraud-detection traffic.
mirrormaker2:
  enabled: false
  version: 4.2.1
  targetCluster:
    bootstrapServers: "b-2.techxtf4orders.5n1354.c2.kafka.us-east-1.amazonaws.com:9096,b-1.techxtf4orders.5n1354.c2.kafka.us-east-1.amazonaws.com:9096"

valkeyMigrationBridge:
  # CDO08-REL-16 BƯỚC 3.8: migration completed and cutover confirmed stable on
  # ElastiCache - the replication link is already severed by complete-migration,
  # so this bridge no longer serves any purpose. Disabled per 08-cleanup.sh.
  enabled: false
